<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aito Catering Service</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- TOP NAVBAR (Cream) -->
<nav class="navbar navbar-expand-lg aito-navbar">
  <div class="container d-flex align-items-center justify-content-between">
    
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="img/logo.png" alt="Aito logo" class="aito-logo">
      <span class="aito-brand-text">Aito Catering Service</span>
    </a>

    <!-- Right Side Actions -->
    <div class="d-flex align-items-center gap-3">
      <a class="btn btn-aito" href="booking.html">Order Now</a>
      <span class="material-symbols-outlined aito-cart" aria-label="cart">
        shopping_cart
      </span>
    </div>
  </div>
</nav>

<!-- CORAL NAV BAR -->
<div class="aito-coral-bar">
  <div class="container d-flex justify-content-center gap-5">
    <a class="coral-link" href="index.html">Home</a>
    <a class="coral-link" href="menu.html">Menu</a>
    <a class="coral-link" href="contact.html">Contact Us</a>
  </div>
</div>

<main class="container my-5">
  <h2 class="mb-4">Customer Info</h2>

  <section class="info-card mx-auto">
    <form id="customerForm" class="info-grid">

      <label class="info-label" for="firstName">First Name</label>
      <input class="info-input" id="firstName" type="text" required>

      <label class="info-label" for="lastName">Last Name</label>
      <input class="info-input" id="lastName" type="text" required>

      <label class="info-label" for="phone">Phone Number</label>
      <input class="info-input" id="phone" type="tel" placeholder="+1 (613) 000-AITO" required>

      <label class="info-label" for="email">E-mail</label>
      <input class="info-input" id="email" type="email" placeholder="name@email.com" required>

      <label class="info-label" for="address1">Address Line 1</label>
      <input class="info-input" id="address1" type="text" required>

      <label class="info-label" for="city">City</label>
      <input class="info-input small-input" id="city" type="text" required>

      <label class="info-label" for="province">Province</label>
      <input class="info-input small-input" id="province" type="text" required>

      <label class="info-label" for="postal">Postal Code</label>
      <input class="info-input small-input" id="postal" type="text" placeholder="K2K 2K2" required>

      <button type="submit" class="btn info-submit">Confirm Order</button>

    </form>
  </section>
</main>

<script src="js/info.js"></script>

<footer class="aito-footer">
  <div class="container text-center">

    <h4 class="footer-brand">Aito Catering Service</h4>

    <div class="footer-links d-flex justify-content-center gap-4 mt-3">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html">Contact Us</a>
      <a href="locate.html">Find Us</a>
    </div>

  </div>
</footer>
</body>
