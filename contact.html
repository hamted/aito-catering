<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aito Catering Service</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- TOP NAVBAR (Cream) -->
<nav class="navbar navbar-expand-lg aito-navbar">
  <div class="container d-flex align-items-center justify-content-between">
    
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="img/logo.png" alt="Aito logo" class="aito-logo">
      <span class="aito-brand-text">Aito Catering Service</span>
    </a>

    <!-- Right Side Actions -->
    <div class="d-flex align-items-center gap-3">
      <a class="btn btn-aito" href="booking.html">Order Now</a>
      <span class="material-symbols-outlined aito-cart" aria-label="cart">
        shopping_cart
      </span>
    </div>
  </div>
</nav>

<!-- CORAL NAV BAR -->
<div class="aito-coral-bar">
  <div class="container d-flex justify-content-center gap-5">
    <a class="coral-link" href="index.html">Home</a>
    <a class="coral-link" href="menu.html">Menu</a>
    <a class="coral-link" href="contact.html">Contact Us</a>
  </div>
</div>

<main class="container my-5">
  <h2 class="mb-2">Contact Us</h2>
  <p class="text-muted mb-4">
    Have any questions? Comments? Concerns? Let us know!
  </p>

  <div class="row g-4">

    <!-- LEFT COLUMN -->
    <div class="col-md-4">

      <!-- Phone -->
      <div class="contact-box text-center mb-4">
        <span class="material-symbols-outlined contact-icon">call</span>
        <h5>Phone Number</h5>
        <p>+1 (613) 000-AITO</p>
      </div>

      <!-- Email -->
      <div class="contact-box text-center">
        <span class="material-symbols-outlined contact-icon">mail</span>
        <h5>E-mail</h5>
        <p>contact@aitofood.com</p>
      </div>

    
    </div>

    <!-- RIGHT COLUMN -->
    <div class="col-md-7">
      <div class="form-box">
        <h4 class="text-center mb-4">Contact Form</h4>

        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="First Name">
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Last Name">
            </div>
            <div class="col-md-6">
              <input type="tel" class="form-control" placeholder="Phone Number">
            </div>
            <div class="col-md-6">
              <input type="email" class="form-control" placeholder="E-mail">
            </div>
            <div class="col-12">
              <textarea class="form-control" rows="5" placeholder="Message"></textarea>
            </div>
          </div>

          <div class="text-center mt-4">
            <button type="submit" class="btn btn-aito px-4">
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</main>

<footer class="aito-footer">
  <div class="container text-center">

    <h4 class="footer-brand">Aito Catering Service</h4>

    <div class="footer-links d-flex justify-content-center gap-4 mt-3">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html">Contact Us</a>
      <a href="locate.html">Find Us</a>
    </div>

  </div>
</footer>
</body>
