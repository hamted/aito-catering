<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aito Catering Service</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- TOP NAVBAR (Cream) -->
  <nav class="navbar navbar-expand-lg aito-navbar">
    <div class="container d-flex align-items-center justify-content-between">
      
      <!-- Brand -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="img/logo.png" alt="Aito logo" class="aito-logo">
        <span class="aito-brand-text">Aito Catering Service</span>
      </a>

      <!-- Actions -->
      <div class="d-flex align-items-center gap-3">
        <a class="btn btn-aito" href="booking.html">Order Now</a>
        <span class="material-symbols-outlined aito-cart" aria-label="cart">shopping_cart</span>
      </div>
    </div>
  </nav>

  <!-- CORAL NAV BAR (Cream links) -->
  <div class="aito-coral-bar">
    <div class="container d-flex justify-content-center gap-5">
      <a class="coral-link" href="index.html">Home</a>
      <a class="coral-link" href="menu.html">Menu</a>
      <a class="coral-link" href="contact.html">Contact Us</a>
    </div>
  </div>

  <!-- HERO -->
  <header class="aito-hero">
    <div class="hero-panel">
      <h1 class="hero-title">Bringing authentic dishes to you,</h1>
      <p class="hero-subtitle">No matter the occasion.</p>
      <a class="btn hero-btn" href="booking.html">Order Now</a>
    </div>
  </header>

  <footer class="aito-footer">
  <div class="container text-center">

    <h4 class="footer-brand">Aito Catering Service</h4>

    <div class="footer-links d-flex justify-content-center gap-4 mt-3">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html">Contact Us</a>
      <a href="locate.html">Find Us</a>
    </div>

  </div>
</footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
