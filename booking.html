<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aito Catering Service</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>


<body>
    <!-- TOP NAVBAR (Cream) -->
<nav class="navbar navbar-expand-lg aito-navbar">
  <div class="container d-flex align-items-center justify-content-between">
    
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="img/logo.png" alt="Aito logo" class="aito-logo">
      <span class="aito-brand-text">Aito Catering Service</span>
    </a>

    <!-- Right Side Actions -->
    <div class="d-flex align-items-center gap-3">
      <a class="btn btn-aito" href="booking.html">Order Now</a>
      <span id="cartBtn" class="material-symbols-outlined aito-cart" role="button" tabindex="0">
            shopping_cart
        </span>
    </div>
  </div>
</nav>

<!-- CORAL NAV BAR -->
<div class="aito-coral-bar">
  <div class="container d-flex justify-content-center gap-5">
    <a class="coral-link" href="index.html">Home</a>
    <a class="coral-link" href="menu.html">Menu</a>
    <a class="coral-link" href="contact.html">Contact Us</a>
  </div>
</div>

<main class="container my-5">
  <h2 class="mb-4">Order Page</h2>

  <div class="order-card mx-auto">
    <form id="orderForm" class="order-form-grid">

      <label for="package" class="order-label">Package</label>
      <select id="package" class="form-control order-input" required>
        <option value="25" data-min="10">Classic Buffet ($25/person, min 10)</option>
  <option value="50" data-min="20">Premium Buffet ($50/person, min 20)</option>
  <option value="20" data-min="10">Veggie Buffet ($20/person, min 10)</option>
  <option value="20" data-min="20">Birthday ($20/person, min 20)</option>
  <option value="22" data-min="20">Combo ($22/person, min 20)</option>
  </select>

      <label for="eventType" class="order-label">Event Type</label>
      <input id="eventType" class="form-control order-input" type="text"
             placeholder="Birthday, Corporate, etc." required>

      <label for="eventDate" class="order-label">Event Date</label>
      <input id="eventDate" class="form-control order-input" type="date" required>

      <label for="eventTime" class="order-label">Event Time</label>
      <input id="eventTime" class="form-control order-input" type="time" required>

      <label for="guests" class="order-label">Guest Count</label>
      <input id="guests" class="form-control order-input" type="number" min="1" value="5" required>
      <!-- <small id="minGuestsText" class="text-muted"></small> -->

      <label for="venue" class="order-label">Event Venue</label>
      <input id="venue" class="form-control order-input" type="text"
             placeholder="Venue name or address" required>

      <label for="requests" class="order-label">Special Requests or<br>Dietary Requirements</label>
      <textarea id="requests" class="form-control order-textarea" rows="3"
                placeholder="Any allergies, dietary restrictions, or special requirements..."></textarea>

      <div class="order-estimate-row">
        <span class="order-label">Estimate</span>
        <span class="order-estimate" id="estimateText">$100.00 ($20 x 5)</span>
      </div>

      <button type="submit" class="btn order-submit">Place Order</button>

    </form>
  </div>
</main>

<footer class="aito-footer">
  <div class="container text-center">

    <h4 class="footer-brand">Aito Catering Service</h4>

    <div class="footer-links d-flex justify-content-center gap-4 mt-3">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html">Contact Us</a>
      <a href="locate.html">Find Us</a>
    </div>

  </div>
</footer>
<script src="js/booking.js"></script>

<script src="js/nav.js"></script>
</body>
